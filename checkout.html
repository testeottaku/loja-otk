<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OttakuBrasil - Checkout</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 font-sans text-gray-800 flex flex-col min-h-screen pt-[75px] overflow-x-hidden">

  <!-- SVGs Helpers -->
  <script>
    const Icons = {

      instagram: `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>`,

      x: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>`,
      filter: `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>`,
      plus: `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>`,
      minus: `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/></svg>`,
      chevronLeft: `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>`,

      phone: `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>`,
      tag: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.586 2.586A2 2 0 0 0 11.172 2H4a2 2 0 0 0-2 2v7.172a2 2 0 0 0 .586 1.414l8.704 8.704a2.426 2.426 0 0 0 3.42 0l6.584-6.584a2.426 2.426 0 0 0 0-3.42z"/><circle cx="7.5" cy="7.5" r=".5" fill="currentColor"/></svg>`

  </script>

  <!-- Firebase and Data Loading -->
  <script type="module" src="app.js"></script>

  <!-- CABEÇALHO -->
  <header class="fixed top-0 left-0 w-full z-50 bg-brand/85 backdrop-blur-lg shadow-md text-gray-900 border-b border-white/40 transition-all duration-300" id="main-header">
    <div class="container mx-auto px-4 pt-3 pb-3">
      <div class="flex items-center justify-between">
        <div class="text-2xl font-black tracking-tighter cursor-pointer flex items-center gap-2" onclick="changeView('home')">
          <span class="bg-gray-900 text-brand px-2 py-1 rounded-lg text-xl transform -rotate-2 shadow-sm">OTK</span>
          OttakuBrasil
        </div>
        <div class="flex items-center gap-4">
          <a href="https://instagram.com/ottakubrasil" target="_blank" class="hidden sm:flex items-center gap-1 hover:text-white transition" id="icon-instagram"></a>
          <button class="relative p-2 bg-white/20 hover:bg-white/40 rounded-full transition-all" onclick="toggleCart(true)">
            <span id="icon-bag"></span>
            <span id="cart-badge" class="hidden absolute -top-1 -right-1 bg-gray-900 text-brand text-xs font-black rounded-full w-5 h-5 flex items-center justify-center shadow-md">0</span>
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- CONTEÚDO PRINCIPAL -->
  <main id="app-root" class="flex-grow pt-[3px]"></main>

  <!-- RODAPÉ -->
  <footer class="bg-brand/85 backdrop-blur-lg text-gray-900 py-10 mt-12 border-t border-white/40">
    <div class="container mx-auto px-4 grid grid-cols-1 md:grid-cols-3 gap-8 text-left">
      <div>
        <h3 class="text-xl font-black mb-3 flex items-center gap-2 justify-start">OttakuBrasil</h3>
        <p class="text-sm font-medium mb-4 text-gray-800">
          Sua loja geek favorita! Especialistas em camisetas exclusivas, action figures e muito mais. Feito de fãs para fãs.
        </p>
      </div>
      <div>
        <h3 class="text-lg font-black mb-3">Links Rápidos</h3>
        <ul class="space-y-2 text-sm font-bold">
          <li><button onclick="changeView('home')" class="hover:text-white transition">Início</button></li>
          <li><button onclick="toggleCart(true)" class="hover:text-white transition">Meu Carrinho</button></li>
          <li><a href="https://instagram.com/ottakubrasil" target="_blank" class="hover:text-white transition">@ottakubrasil</a></li>
        </ul>
      </div>
      <div>
        <h3 class="text-lg font-black mb-3">Contato</h3>
        <ul class="space-y-3 text-sm font-bold">
          <li class="flex items-center gap-2 justify-start"><span id="ft-icon-insta"></span> @ottakubrasil</li>
          <li class="flex items-center gap-2 justify-start"><span id="ft-icon-phone"></span> (31) 9 7237-9858</li>
        </ul>
      </div>
    </div>
    <div class="container mx-auto px-4 mt-8 pt-6 border-t border-gray-900/10 text-left text-xs font-bold text-gray-800">
      &copy; <span id="current-year"></span> OttakuBrasil. Todos os direitos reservados.
    </div>
  </footer>

  <!-- CARRINHO LATERAL -->
  <div id="cart-sidebar" class="fixed inset-0 z-[60] flex justify-end hidden">
    <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="toggleCart(false)"></div>
    <div class="relative w-full max-w-md bg-white h-full shadow-2xl flex flex-col animate-slide-in-right">
      <div class="p-4 border-b border-gray-200 flex justify-between items-center bg-gray-50">
        <h2 class="text-xl font-black text-gray-900 flex items-center gap-2">
          <span class="text-brand" id="cb-icon-bag"></span> Seu Carrinho
        </h2>
        <button onclick="toggleCart(false)" class="p-2 hover:bg-gray-200 rounded-full transition" id="cb-icon-x"></button>
      </div>
      <div id="cart-items" class="flex-grow overflow-y-auto p-4 space-y-4"></div>
      <div id="cart-footer" class="p-5 border-t border-gray-200 bg-gray-50"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
