<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - OttakuBrasil</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { colors: { brand: '#20DE6E' } } } }</script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 font-sans text-gray-800 flex flex-col min-h-screen pt-[75px] overflow-x-hidden">
  
  <header class="fixed top-0 left-0 w-full z-50 bg-brand/85 backdrop-blur-lg shadow-md text-gray-900 border-b border-white/40 transition-all duration-300" id="main-header">
    <div class="container mx-auto px-4 pt-3 pb-3">
      <div class="flex items-center justify-between">
        <div class="text-2xl font-black tracking-tighter cursor-pointer flex items-center gap-2" onclick="window.changeView('home')">
          <span class="bg-gray-900 text-brand px-2 py-1 rounded-lg text-xl transform -rotate-2 shadow-sm">OTK</span> OttakuBrasil
        </div>
      </div>
      <div id="sub-header" class="hidden"></div>
    </div>
  </header>

  <main id="app-root" class="flex-grow pt-[3px]"></main>

  <footer class="bg-brand/85 backdrop-blur-lg text-gray-900 py-10 mt-12 border-t border-white/40">
    <div class="container mx-auto px-4 text-center">
      <p class="text-sm font-medium text-gray-800">&copy; <span id="current-year"></span> OttakuBrasil. Todos os direitos reservados.</p>
    </div>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
