<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produto - OttakuBrasil</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { colors: { brand: '#20DE6E' } } } }</script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 font-sans text-gray-800 flex flex-col min-h-screen pt-[75px] overflow-x-hidden">
  
  <header class="fixed top-0 left-0 w-full z-50 bg-brand/85 backdrop-blur-lg shadow-md text-gray-900 border-b border-white/40 transition-all duration-300" id="main-header">
    <div class="container mx-auto px-4 pt-3 pb-3">
      <div class="flex items-center justify-between">
        <div class="text-2xl font-black tracking-tighter cursor-pointer flex items-center gap-2" onclick="window.changeView('home')">
          <span class="bg-gray-900 text-brand px-2 py-1 rounded-lg text-xl transform -rotate-2 shadow-sm">OTK</span> OttakuBrasil
        </div>
        <div class="flex items-center gap-4">
          <button class="relative p-2 bg-white/20 hover:bg-white/40 rounded-full transition-all" onclick="window.toggleCart(true)">
            <span id="icon-bag"></span>
            <span id="cart-badge" class="hidden absolute -top-1 -right-1 bg-gray-900 text-brand text-xs font-black rounded-full w-5 h-5 flex items-center justify-center shadow-md">0</span>
          </button>
        </div>
      </div>
      <div id="sub-header" class="hidden"></div>
    </div>
  </header>

  <main id="app-root" class="flex-grow pt-[3px]"></main>

  <footer class="bg-brand/85 backdrop-blur-lg text-gray-900 py-10 mt-12 border-t border-white/40">
    <div class="container mx-auto px-4 grid grid-cols-1 md:grid-cols-3 gap-8 text-left">
      <div>
        <h3 class="text-xl font-black mb-3 flex items-center gap-2 justify-start">OttakuBrasil</h3>
        <p class="text-sm font-medium mb-4 text-gray-800">Sua loja geek favorita! Feito de fãs para fãs.</p>
      </div>
      <div>
        <h3 class="text-lg font-black mb-3">Contato</h3>
        <ul class="space-y-3 text-sm font-bold">
          <li class="flex items-center gap-2 justify-start"><span id="ft-icon-insta"></span> @ottakubrasil</li>
          <li class="flex items-center gap-2 justify-start"><span id="ft-icon-phone"></span> (31) 9 7237-9858</li>
        </ul>
      </div>
    </div>
  </footer>

  <div id="cart-sidebar" class="fixed inset-0 z-[60] flex justify-end hidden">
    <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="window.toggleCart(false)"></div>
    <div class="relative w-full max-w-md bg-white h-full shadow-2xl flex flex-col animate-slide-in-right">
      <div class="p-4 border-b border-gray-200 flex justify-between items-center bg-gray-50">
        <h2 class="text-xl font-black text-gray-900 flex items-center gap-2"><span class="text-brand" id="cb-icon-bag"></span> Seu Carrinho</h2>
        <button onclick="window.toggleCart(false)" class="p-2 hover:bg-gray-200 rounded-full transition" id="cb-icon-x"></button>
      </div>
      <div id="cart-items" class="flex-grow overflow-y-auto p-4 space-y-4"></div>
      <div id="cart-footer" class="p-5 border-t border-gray-200 bg-gray-50"></div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
